name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: alog-linux-amd64.tar.gz
            binary: alog
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: alog-linux-arm64.tar.gz
            binary: alog
            cross_pkg: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: alog-macos-amd64.tar.gz
            binary: alog
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: alog-macos-arm64.tar.gz
            binary: alog
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: alog-windows-amd64.zip
            binary: alog.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross_pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: Configure cross-compilation linker (Linux ARM64)
        if: matrix.cross_pkg != ''
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/alog alog
          tar czf ${{ matrix.archive }} alog
          rm alog

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item "target\${{ matrix.target }}\release\alog.exe" "alog.exe"
          Compress-Archive -Path "alog.exe" -DestinationPath "${{ matrix.archive }}"
          Remove-Item "alog.exe"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Read release notes
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES_FILE="docs/releases/${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "body_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.body_path == '' }}
          files: artifacts/*
